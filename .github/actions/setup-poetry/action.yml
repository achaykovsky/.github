name: Setup Poetry environment
description: Checkout repository, install Poetry, cache the venv, and optionally install dependencies.

inputs:
  python-version:
    description: Python version to install.
    required: true
  poetry-version:
    description: Poetry version to install.
    required: false
    default: "1.8.3"
  working-directory:
    description: Path to the Poetry project root (monorepo subpath support).
    required: false
    default: "."
  install-dependencies:
    description: Run poetry install after caching the virtualenv.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: ${{ inputs.poetry-version }}
        virtualenvs-create: true
        virtualenvs-in-project: true

    # Cache key includes python version so upgrades invalidate stale venvs.
    - name: Cache Poetry virtualenv
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working-directory }}/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles(format('{0}/poetry.lock', inputs.working-directory)) }}

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: poetry install --no-interaction
